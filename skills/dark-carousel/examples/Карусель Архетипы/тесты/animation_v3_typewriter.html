<!DOCTYPE html>
<html lang="ru"><head><meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;700;800;900&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1080px; height: 1350px; overflow: hidden; background: #EFEAE0; }

  .frame {
    position: relative; width: 1080px; height: 1350px;
    background: #EFEAE0;
    font-family: 'Inter', sans-serif;
    color: #1A1A1A; overflow: hidden;
  }

  /* Лёгкий фон со сдвигом */
  .grid-overlay {
    position: absolute; inset: 0;
    background:
      linear-gradient(#CFC4A8 1px, transparent 1px) 0 0/40px 40px,
      linear-gradient(90deg, #CFC4A8 1px, transparent 1px) 0 0/40px 40px;
    opacity: 0.32; pointer-events: none;
    animation: gridShift 10s linear infinite;
  }
  @keyframes gridShift {
    from { background-position: 0 0, 0 0; }
    to   { background-position: 40px 40px, 40px 40px; }
  }

  .bookmark {
    position: absolute; top: 36px; left: 56px;
    width: 38px; height: 60px; background: #E85A2C;
    clip-path: polygon(0 0, 100% 0, 100% 100%, 50% 78%, 0 100%);
    z-index: 5;
    opacity: 0;
    animation: drop 0.4s 0.1s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
  }
  @keyframes drop {
    from { opacity: 0; transform: translateY(-30px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .meta-tl {
    position: absolute; top: 56px; left: 116px;
    font-weight: 800; font-size: 22px; letter-spacing: 0.5px; z-index: 5;
    font-family: 'JetBrains Mono', monospace;
    overflow: hidden; white-space: nowrap;
    width: 0;
    animation: typeMeta 0.6s 0.3s steps(5) forwards;
  }
  @keyframes typeMeta {
    to { width: 60px; }
  }

  .nick {
    position: absolute; bottom: 36px; left: 56px;
    font-weight: 800; font-size: 22px; color: #1A1A1A; letter-spacing: 1px; z-index: 5;
    font-family: 'JetBrains Mono', monospace;
    overflow: hidden; white-space: nowrap;
    width: 0;
    animation: typeNick 0.7s 3s steps(9) forwards;
  }
  @keyframes typeNick {
    to { width: 130px; }
  }

  .header {
    position: absolute; top: 110px; left: 56px; right: 56px; z-index: 4;
  }

  /* === NUMBER SCRAMBLE: цифры мелькают и останавливаются === */
  .num-wrap {
    display: inline-block;
    width: 130px;
    height: 130px;
    overflow: hidden;
    vertical-align: top;
  }
  .num {
    font-weight: 900; font-size: 130px; line-height: 1;
    color: #E85A2C; letter-spacing: -5px; display: inline-block;
  }
  .num-scramble {
    display: inline-block;
    animation: scramble 1.2s 0.4s steps(12) forwards;
  }
  @keyframes scramble {
    0%   { content: '#3'; transform: translateY(0); }
    100% { transform: translateY(-1430px); }
  }
  .num-roll {
    display: flex;
    flex-direction: column;
    line-height: 130px;
    height: 130px;
    transform: translateY(0);
    animation: rollNum 1.4s 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
  }
  @keyframes rollNum {
    0%   { transform: translateY(0); }
    100% { transform: translateY(-1430px); }
  }
  .num-roll span {
    font-weight: 900; font-size: 130px; line-height: 130px;
    color: #E85A2C; letter-spacing: -5px;
    height: 130px;
  }

  /* === TITLE: letter reveal слева направо === */
  .arch-name {
    font-weight: 900; font-size: 92px; line-height: 0.98;
    color: #1A1A1A; letter-spacing: -3px; margin-top: 14px;
    overflow: hidden;
  }
  .arch-name .ch {
    display: inline-block;
    opacity: 0;
    transform: translateY(60px);
    animation: revealChar 0.5s forwards;
  }

  /* === TAGLINE: TYPEWRITER с курсором === */
  .tagline {
    font-family: 'JetBrains Mono', monospace;
    font-weight: 700; font-size: 30px; line-height: 1.18;
    color: #E85A2C; margin-top: 26px;
    letter-spacing: -0.2px; max-width: 940px;
    overflow: hidden; white-space: nowrap;
    width: 0;
    animation: typeTagline 1.6s 2s steps(28) forwards;
    border-right: 4px solid #E85A2C;
  }
  @keyframes typeTagline {
    to { width: 720px; }
  }
  .tagline.done {
    animation:
      typeTagline 1.6s 2s steps(28) forwards,
      caretBlink 0.6s 3.6s 4 step-end;
  }
  @keyframes caretBlink {
    50% { border-right-color: transparent; }
  }

  .logos {
    position: absolute; top: 470px; left: 0; right: 0;
    width: 1080px; height: 460px;
    z-index: 3; overflow: hidden;
    opacity: 0;
    animation: fadeIn 0.7s 1.4s forwards;
  }
  .logos img {
    width: 100%; height: 100%;
    object-fit: cover; display: block;
  }

  /* === CARD: typewriter по строкам === */
  .card {
    position: absolute; bottom: 200px; left: 56px; right: 56px;
    background: #0A0A0A; border-radius: 24px;
    padding: 30px 44px; z-index: 3;
    box-shadow: 0 20px 60px rgba(232, 90, 44, 0.18), 0 4px 12px rgba(0,0,0,0.35);
    color: #FFFFFF;
    opacity: 0;
    animation: fadeUp 0.6s 3.8s forwards;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(30px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .row {
    display: flex; align-items: baseline;
    padding: 9px 0; border-bottom: 1px solid #2A2A2A;
  }
  .row:last-child { border-bottom: none; padding-bottom: 0; }
  .row:first-child { padding-top: 0; }
  .label {
    width: 180px; flex-shrink: 0;
    font-weight: 900; font-size: 16px;
    color: #E85A2C; letter-spacing: 1.5px;
    text-transform: uppercase;
  }
  .value {
    flex: 1; font-weight: 700; font-size: 22px;
    color: #FFFFFF; line-height: 1.25; letter-spacing: -0.2px;
    overflow: hidden; white-space: nowrap;
    width: 0;
  }
  .row:nth-child(1) .value { animation: typeRow1 0.9s 4.2s steps(35) forwards; }
  .row:nth-child(2) .value { animation: typeRow2 0.7s 5.2s steps(22) forwards; }
  .row:nth-child(3) .value { animation: typeRow3 0.9s 6.0s steps(30) forwards; }
  @keyframes typeRow1 { to { width: 100%; } }
  @keyframes typeRow2 { to { width: 100%; } }
  @keyframes typeRow3 { to { width: 100%; } }

  .footer {
    position: absolute; bottom: 86px; left: 56px; right: 56px;
    font-weight: 800; font-size: 26px; color: #1A1A1A;
    line-height: 1.3; letter-spacing: -0.3px; z-index: 4;
    opacity: 0;
    animation: fadeIn 0.5s 7.0s forwards;
  }

  .arrow {
    color: #E85A2C; font-weight: 900;
    display: inline-block;
    animation: bounceRight 1.2s 7.5s ease-in-out infinite;
  }
  @keyframes bounceRight {
    0%, 100% { transform: translateX(0); }
    50%      { transform: translateX(10px); }
  }

  @keyframes fadeIn { to { opacity: 1; } }

  /* === Char reveal stagger для заголовка === */
  .arch-name .ch:nth-child(1)  { animation-delay: 0.6s; }
  .arch-name .ch:nth-child(2)  { animation-delay: 0.66s; }
  .arch-name .ch:nth-child(3)  { animation-delay: 0.72s; }
  .arch-name .ch:nth-child(4)  { animation-delay: 0.78s; }
  .arch-name .ch:nth-child(5)  { animation-delay: 0.84s; }
  .arch-name .ch:nth-child(6)  { animation-delay: 0.90s; }
  .arch-name .ch:nth-child(7)  { animation-delay: 0.96s; }
  .arch-name .ch:nth-child(8)  { animation-delay: 1.02s; }
  .arch-name .ch:nth-child(9)  { animation-delay: 1.08s; }
  .arch-name .ch:nth-child(10) { animation-delay: 1.14s; }
  .arch-name .ch:nth-child(11) { animation-delay: 1.20s; }
  .arch-name .ch:nth-child(12) { animation-delay: 1.26s; }
  .arch-name .ch:nth-child(13) { animation-delay: 1.32s; }

  @keyframes revealChar {
    to { opacity: 1; transform: translateY(0); }
  }
</style></head><body>
<div class="frame">
  <div class="grid-overlay"></div>
  <div class="bookmark"></div>
  <div class="meta-tl">03/16</div>
  <div class="header">
    <div class="num-wrap">
      <div class="num-roll">
        <span>#7</span>
        <span>#3</span>
        <span>#9</span>
        <span>#2</span>
        <span>#5</span>
        <span>#8</span>
        <span>#4</span>
        <span>#6</span>
        <span>#0</span>
        <span>#3</span>
        <span>#2</span>
        <span>#1</span>
      </div>
    </div>
    <div class="arch-name"><span class="ch">П</span><span class="ch">Р</span><span class="ch">О</span><span class="ch">С</span><span class="ch">Т</span><span class="ch">О</span><span class="ch">Д</span><span class="ch">У</span><span class="ch">Ш</span><span class="ch">Н</span><span class="ch">Ы</span><span class="ch">Й</span></div>
    <div class="tagline done">Ищет рай. Боится ошибиться.</div>
  </div>
  <div class="logos"><img src="../assets/3d_logos/03_pro.png" alt=""></div>
  <div class="card">
    <div class="row"><div class="label">Желание</div><div class="value">Идеальная жизнь. Счастливый финал.</div></div>
    <div class="row"><div class="label">Страх</div><div class="value">Сделать что-то не так.</div></div>
    <div class="row"><div class="label">Бренды</div><div class="value">Disney · Coca-Cola · McDonald's</div></div>
  </div>
  <div class="footer">Зарабатывает на простоте и оптимизме. <span class="arrow">→</span></div>
  <div class="nick">@vladyasko</div>
</div>
</body></html>
