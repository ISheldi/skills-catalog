<!DOCTYPE html>
<html lang="ru"><head><meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;700;800;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1080px; height: 1350px; overflow: hidden; background: #EFEAE0; }
  .frame {
    position: relative; width: 1080px; height: 1350px;
    background: #EFEAE0;
    font-family: 'Inter', sans-serif;
    color: #1A1A1A; overflow: hidden;
  }
  .grid-overlay {
    position: absolute; inset: 0;
    background:
      linear-gradient(#CFC4A8 1px, transparent 1px) 0 0/40px 40px,
      linear-gradient(90deg, #CFC4A8 1px, transparent 1px) 0 0/40px 40px;
    opacity: 0.35; pointer-events: none;
  }
  .bookmark {
    position: absolute; top: 36px; left: 56px;
    width: 38px; height: 60px; background: #E85A2C;
    clip-path: polygon(0 0, 100% 0, 100% 100%, 50% 78%, 0 100%);
    z-index: 5;
  }
  .meta-tl {
    position: absolute; top: 56px; left: 116px;
    font-weight: 800; font-size: 22px; letter-spacing: 0.5px; z-index: 5;
  }
  .nick {
    position: absolute; bottom: 36px; left: 56px;
    font-weight: 800; font-size: 22px; color: #1A1A1A; letter-spacing: 1px; z-index: 5;
  }
  .header {
    position: absolute; top: 110px; left: 56px; right: 56px; z-index: 4;
  }
  .num {
    font-weight: 900; font-size: 130px; line-height: 1;
    color: #E85A2C; letter-spacing: -5px; display: inline-block;
  }
  .arch-name {
    font-weight: 900; font-size: 92px; line-height: 0.98;
    color: #1A1A1A; letter-spacing: -3px; margin-top: 14px;
  }
  .tagline {
    font-weight: 800; font-size: 30px; line-height: 1.18;
    color: #E85A2C; margin-top: 22px;
    letter-spacing: -0.2px; max-width: 940px;
  }
  /* FULL-BLEED 3D image */
  .logos {
    position: absolute;
    top: 470px;
    left: 0; right: 0;
    width: 1080px;
    height: 460px;
    z-index: 3;
    overflow: hidden;
  }
  .logos img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }
  .card {
    position: absolute; bottom: 200px; left: 56px; right: 56px;
    background: #0A0A0A; border-radius: 24px;
    padding: 30px 44px; z-index: 3;
    box-shadow: 0 20px 60px rgba(232, 90, 44, 0.18), 0 4px 12px rgba(0,0,0,0.35);
    color: #FFFFFF;
  }
  .row {
    display: flex; align-items: baseline;
    padding: 9px 0; border-bottom: 1px solid #2A2A2A;
  }
  .row:last-child { border-bottom: none; padding-bottom: 0; }
  .row:first-child { padding-top: 0; }
  .label {
    width: 180px; flex-shrink: 0;
    font-weight: 900; font-size: 16px;
    color: #E85A2C; letter-spacing: 1.5px;
    text-transform: uppercase;
  }
  .value {
    flex: 1; font-weight: 700; font-size: 22px;
    color: #FFFFFF; line-height: 1.25; letter-spacing: -0.2px;
  }
  .footer {
    position: absolute; bottom: 86px; left: 56px; right: 56px;
    font-weight: 800; font-size: 26px; color: #1A1A1A;
    line-height: 1.3; letter-spacing: -0.3px; z-index: 4;
  }
  .footer .accent { color: #E85A2C; font-weight: 900; }
</style></head><body>
<div class="frame">
  <div class="grid-overlay"></div>
  <div class="bookmark"></div>
  <div class="meta-tl">03/16</div>
  <div class="header">
    <span class="num">#1</span>
    <div class="arch-name">ПРОСТОДУШНЫЙ</div>
    <div class="tagline">Ищет рай. Боится ошибиться.</div>
  </div>
  <div class="logos"><img src="../assets/3d_logos/03_pro.png" alt=""></div>
  <div class="card">
    <div class="row"><div class="label">Желание</div><div class="value">Идеальная жизнь. Счастливый финал.</div></div>
    <div class="row"><div class="label">Страх</div><div class="value">Сделать что-то не так.</div></div>
    <div class="row"><div class="label">Бренды</div><div class="value">Disney · Coca-Cola · McDonald's</div></div>
  </div>
  <div class="footer">Зарабатывает на простоте и оптимизме. <span class="accent">→</span></div>
  <div class="nick">@vladyasko</div>
</div></body></html>
