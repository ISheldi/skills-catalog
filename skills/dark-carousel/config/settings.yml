# carousel skill — default settings

model:
  generation: nano_banana_2          # фотореалистичные слайды
  default_resolution: 1k             # этого достаточно для IG
  # nano_banana_2 НЕ поддерживает параметр quality, не передавать

formats:
  A: brand-personality               # фото автора + типографика
  B: higgsfield-html-hybrid          # Higgsfield cover + HTML

slide_count:
  short: 8
  standard: 12
  guide: 16
  max: 20

iteration_limits:
  higgsfield_max_retries: 3
  call_user_after_failures: 3

safety:
  max_image_dimension_px: 2000
  max_png_reads_per_batch: 5
  resize_command: "sips -Z 2000 <file>"
  test_quality_first: true           # чистовик только после апрува

brand:
  nickname: "@vladyasko"           # ← ЗАМЕНИ на свой Instagram-ник (рендерится на каждом слайде)
  primary_orange: "#E85A2C"
  cream_bg: "#EFEAE0"
  dark_card: "#0A0A0A"
  grid_color: "#CFC4A8"
  fonts:
    headline: "Inter (900)"
    body: "Inter (600-700)"
    mono: "JetBrains Mono"

output:
  size: "1080x1350"                  # IG carousel native
  format: png
  device_scale_factor: 1
